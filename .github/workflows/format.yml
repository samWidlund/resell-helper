name: Publish helper
run-name: Product information formatting
on: workflow_dispatch

jobs:
  format-products:
    runs-on: ubuntu-latest
    environment: telegramApi
    env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}

    steps:
      - uses: actions/checkout@v6
      - name: Create credentials.json
        run: echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client python-telegram-bot requests dotenv

      - name: Debug
        run: |
          ls -la
          ls notification/

      - name: Run publishProducts.py
        run:  python publish/publishProducts.py