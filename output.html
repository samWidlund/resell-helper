<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; margin: 40px; background: #1a1a1a; color: #fff; }
  .product-card { background: #2a2a2a; padding: 20px; margin: 10px 0; border-radius: 8px; }
  .copy-section { white-space: pre-wrap; line-height: 1.6; }
  .copy-btn { cursor: pointer; background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 4px; margin-top: 10px; }
  .copy-btn:hover { background: #45a049; }
</style>
</head>
<body>
<h2>Kopiera till Instagram / Facebook</h2>

    <div class="product-card">
      <div class="copy-section" id="product-0">
beta sl jacket
299
arcteryx
great
black jacket
#streetwear, #gorpcore</div>
      <button class="copy-btn" onclick="copyProduct('product-0')">Kopiera</button>
    </div>
    
    <div class="product-card">
      <div class="copy-section" id="product-1">
test
test3
test5
teest
test2
#test #test</div>
      <button class="copy-btn" onclick="copyProduct('product-1')">Kopiera</button>
    </div>
    
<script>
function copyProduct(id) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text).then(() => alert('Kopierat!'));
}
</script>
</body>
</html>
